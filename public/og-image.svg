<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Portfólio de Gilvan Oliveira</title>
  <desc id="desc">Imagem social com nome, função e especialidades de Gilvan Oliveira.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#040611" />
      <stop offset="100%" stop-color="#071226" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="50%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#86efac" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="168" cy="112" r="180" fill="#7c3aed" opacity="0.16" />
  <circle cx="1050" cy="520" r="220" fill="#22d3ee" opacity="0.12" />
  <circle cx="840" cy="120" r="120" fill="#86efac" opacity="0.08" />
  <rect x="72" y="72" width="1056" height="486" rx="36" fill="#0b1328" opacity="0.72" />
  <rect x="72" y="72" width="1056" height="486" rx="36" fill="none" stroke="#1e293b" />

  <text x="120" y="178" fill="#67e8f9" font-size="26" font-family="Aptos, Segoe UI, sans-serif" letter-spacing="6">
